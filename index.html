<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Dost Complaint Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1e1b4b,#312e81);
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:36px;
}

.header p{
color:#ddd;
margin-top:5px;
}

.form-box{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.15);
color:white;
font-size:16px;
outline:none;
}

textarea{
height:120px;
resize:none;
}

input::placeholder,
textarea::placeholder{
color:#ddd;
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
background:white;
color:#4c1d95;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#eee;
}

.success{
display:none;
margin-top:20px;
padding:15px;
background:#14532d;
border-radius:10px;
text-align:center;
}

.footer{
text-align:center;
margin-top:25px;
color:#ddd;
}

.card{
background:white;
color:black;
padding:15px;
margin-top:15px;
border-radius:15px;
}

.card b{
color:#4c1d95;
}

</style>

</head>

<body>

<div class="header">

<h1>CYBER DOST</h1>

<p>Cyber Crime Complaint Portal</p>

</div>

<div class="form-box">

<label>Full Name</label>

<input type="text" id="name" placeholder="Enter your name">

<label>Mobile Number</label>

<input type="number" id="mobile" placeholder="Enter mobile number">

<label>Email Address</label>

<input type="email" id="email" placeholder="Enter email">

<label>Complaint Type</label>

<select id="type">

<option>Online Fraud</option>

<option>UPI Scam</option>

<option>Fake Call</option>

<option>Instagram Hack</option>

<option>Facebook Hack</option>

<option>Cyber Bullying</option>

</select>

<label>Complaint Details</label>

<textarea id="details" placeholder="Describe your complaint"></textarea>

<label>Date of Incident</label>

<input type="date" id="date">

<button onclick="submitComplaint()">

Submit Complaint

</button>

<div class="success" id="success">

Complaint Submitted Successfully ✅

</div>

</div>

<br><br>

<h2 style="text-align:center;">
All Complaints
</h2>

<div id="data"></div>

<div class="footer">

© 2026 Cyber Dost Portal

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAEScUVQRwFKuPuQBttPyLmkJ5oD59ixIg",

authDomain: "cyber-dost-2f53a.firebaseapp.com",

projectId: "cyber-dost-2f53a",

storageBucket: "cyber-dost-2f53a.firebasestorage.app",

messagingSenderId: "519391576773",

appId: "1:519391576773:web:8075fd3cd45e44a4cda6ac"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.submitComplaint = async function(){

const complaintNumber = "CC-" + Date.now();

const name =
document.getElementById("name").value;

const mobile =
document.getElementById("mobile").value;

const email =
document.getElementById("email").value;

const type =
document.getElementById("type").value;

const details =
document.getElementById("details").value;

const date =
document.getElementById("date").value;

await addDoc(collection(db,"complaints"),{

complaintNumber,
name,
mobile,
email,
type,
details,
date,
status:"Pending"

});

document.getElementById("success").style.display = "block";

loadData();

}

async function loadData(){

document.getElementById("data").innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"complaints"));

querySnapshot.forEach((doc)=>{

const x = doc.data();

document.getElementById("data").innerHTML += `

<div class="card">

<b>Complaint No:</b>
${x.complaintNumber}<br><br>

<b>Name:</b>
${x.name}<br><br>

<b>Mobile:</b>
${x.mobile}<br><br>

<b>Email:</b>
${x.email}<br><br>

<b>Complaint Type:</b>
${x.type}<br><br>

<b>Details:</b>
${x.details}<br><br>

<b>Date:</b>
${x.date}<br><br>

<b>Status:</b>
${x.status}

</div>

`;

});

}

loadData();

</script>

</body>
</html>
