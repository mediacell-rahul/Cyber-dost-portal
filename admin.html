<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f2f2f2;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

</style>

</head>

<body>

<h2>All Complaints</h2>

<div id="data"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyAEScUVQRwFKuPuQBttPyLmkJ5oD59ixIg",

  authDomain: "cyber-dost-2f53a.firebaseapp.com",

  databaseURL: "https://cyber-dost-2f53a-default-rtdb.firebaseio.com",

  projectId: "cyber-dost-2f53a",

  storageBucket: "cyber-dost-2f53a.firebasestorage.app",

  messagingSenderId: "519391576773",

  appId: "1:519391576773:web:8075fd3cd45e44a4cda6ac"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function loadData(){

const querySnapshot =
await getDocs(collection(db,"complaints"));

querySnapshot.forEach((doc)=>{

const x = doc.data();

document.getElementById("data").innerHTML += `

<div class="card">

<b>Complaint No:</b>
${x.complaintNumber}<br><br>

<b>Name:</b>
${x.name}<br><br>

<b>Mobile:</b>
${x.mobile}<br><br>

<b>Address:</b>
${x.address}<br><br>

<b>Fraud Type:</b>
${x.fraud}<br><br>

<b>Complaint:</b>
${x.complaint}<br><br>

<b>Status:</b>
${x.status}

</div>

`;

});

}

loadData();

</script>

</body>
</html>
